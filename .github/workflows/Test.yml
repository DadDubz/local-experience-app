name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16.x, 18.x]
        mongodb-version: [4.4]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1  # Ensures full repo is cloned

      - name: Debug Working Directory
        run: pwd && ls -la  # Prints directory to check if package.json exists

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Stop old MongoDB processes (if any)
      - name: Stop old MongoDB instances (if any)
        run: |
          sudo systemctl stop mongod || true
          docker stop $(docker ps -q --filter ancestor=mongo) || true
          docker rm $(docker ps -aq --filter ancestor=mongo) || true

      # Start MongoDB on a different port to avoid conflicts
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.10.0
        with:
          mongodb-version: "4.4"
          mongodb-port: 27017  # Ensure this matches MONGODB_URI below

      - name: Wait for MongoDB to start
        run: sleep 20s  # Ensures MongoDB is ready before running tests

      - name: Check MongoDB Status
        run: ps aux | grep mongo  # Debugging step

      # Install backend dependencies in the correct directory
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Install frontend dependencies if frontend directory exists
      - name: Install frontend dependencies (If Exists)
        run: |
          test -d "frontend" && (cd frontend && npm ci)

      # Run backend tests in the correct directory
      - name: Run backend tests
        working-directory: backend
        run: npm test
        env:
          CI: true
          MONGODB_URI: mongodb://localhost:27017/test  # Ensure MongoDB is running on this port
          JWT_SECRET: test_secret
          NODE_ENV: test

      # Run frontend tests only if frontend exists
      - name: Run frontend tests (If Exists)
        working-directory: frontend
        run: |
          test -d "frontend" && npm test
        env:
          CI: true

      # Run build process
      - name: Build check
        run: |
          npm run build
          test -d "frontend" && (cd frontend && npm run build)

      # Upload test coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            backend/coverage/
            frontend/coverage/
